name: Cron Jobs

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - reminders
          - update-statuses
      deployment:
        description: 'Which deployment to target'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - CTC
          - AVD
      session_id:
        description: 'Session ID for targeted reminders (optional)'
        required: false
        type: string

jobs:
  cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    strategy:
      matrix:
        deployment:
          - name: CTC
            url_secret: API_BASE_URL_CTC
            cron_secret: CRON_SECRET_CTC
          - name: AVD
            url_secret: API_BASE_URL_AVD
            cron_secret: CRON_SECRET_AVD
      fail-fast: false
    name: "Cron — ${{ matrix.deployment.name }}"
    steps:
      - name: Check if this deployment should run
        id: gate
        run: |
          SELECTED="${{ github.event.inputs.deployment }}"
          CURRENT="${{ matrix.deployment.name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$SELECTED" != "both" ] && [ "$SELECTED" != "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $CURRENT (targeted: $SELECTED)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine jobs to run
        if: steps.gate.outputs.skip != 'true'
        id: jobs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — run what the user selected
            echo "run_statuses=true" >> $GITHUB_OUTPUT
            echo "run_reminders=true" >> $GITHUB_OUTPUT
            JOB="${{ github.event.inputs.job }}"
            if [ "$JOB" = "update-statuses" ]; then
              echo "run_reminders=false" >> $GITHUB_OUTPUT
            elif [ "$JOB" = "reminders" ]; then
              echo "run_statuses=false" >> $GITHUB_OUTPUT
            fi
          else
            # Scheduled trigger — always run statuses (every 5 min)
            echo "run_statuses=true" >> $GITHUB_OUTPUT
            # Only run reminders at :00, :15, :30, :45 (every 15 min)
            MINUTE=$(date -u +%M)
            if [ $((10#$MINUTE % 15)) -eq 0 ]; then
              echo "run_reminders=true" >> $GITHUB_OUTPUT
            else
              echo "run_reminders=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "Update statuses — ${{ matrix.deployment.name }}"
        if: steps.gate.outputs.skip != 'true' && steps.jobs.outputs.run_statuses == 'true'
        env:
          API_BASE_URL: ${{ secrets[matrix.deployment.url_secret] }}
          CRON_SECRET: ${{ secrets[matrix.deployment.cron_secret] }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets not configured for ${{ matrix.deployment.name }}, skipping"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${API_BASE_URL}/cron/update-statuses")
          echo "update-statuses: $HTTP_CODE"
          [ "$HTTP_CODE" -eq 200 ] || { echo "::error::Failed ($HTTP_CODE)"; exit 1; }

      - name: "Send reminders — ${{ matrix.deployment.name }}"
        if: steps.gate.outputs.skip != 'true' && steps.jobs.outputs.run_reminders == 'true'
        env:
          API_BASE_URL: ${{ secrets[matrix.deployment.url_secret] }}
          CRON_SECRET: ${{ secrets[matrix.deployment.cron_secret] }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::Secrets not configured for ${{ matrix.deployment.name }}, skipping"
            exit 0
          fi
          ENDPOINT="${API_BASE_URL}/cron/reminders"
          if [ -n "${{ github.event.inputs.session_id }}" ]; then
            ENDPOINT="${ENDPOINT}?session_id=${{ github.event.inputs.session_id }}"
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$ENDPOINT")
          echo "reminders: $HTTP_CODE"
          [ "$HTTP_CODE" -eq 200 ] || { echo "::error::Failed ($HTTP_CODE)"; exit 1; }
